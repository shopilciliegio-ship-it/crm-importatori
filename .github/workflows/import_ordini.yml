name: Import Ordini da Gmail

on:
  schedule:
    - cron: '0 */4 * * *'  # ogni 4 ore
  workflow_dispatch:        # trigger manuale dal CRM o da GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Installa Playwright browser
        run: python -m playwright install --with-deps

      - name: Importa ordini
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:            ${{ github.repository }}
        run: python scripts/import_ordini.py

      - name: Fetch tracking Fieramente
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
          # FIERAMENTE_USER e FIERAMENTE_PASS opzionali — fallback hardcoded nello script
        run: python scripts/fetch_fieramente_tracking.py

      - name: Fetch tracking Spedire.com
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: python scripts/fetch_spedire_tracking.py

      # ── MBE pubblico — DORMIENTE (mbe.it bloccato da Akamai WAF, mai funzionato) ──
      # Riattivare rimuovendo "if: false" quando risolto o sostituito da UPS API
      - name: Fetch tracking MBE pubblico (mbe.it)
        if: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: python scripts/fetch_mbe_public_tracking.py

      # ── MBE tracking via login — DORMIENTE (API interna stantia per vino) ───
      # Riattivare rimuovendo "if: false"
      - name: Fetch tracking MBE
        if: false
        env:
          MBE_EMAIL:       ${{ secrets.MBE_EMAIL }}
          MBE_PASSWORD:    ${{ secrets.MBE_PASSWORD }}
          MBE_TOTP_SECRET: ${{ secrets.MBE_TOTP_SECRET }}
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:         ${{ github.repository }}
        run: python scripts/fetch_mbe_tracking.py
      # ────────────────────────────────────────────────────────────────────────

      - name: Invia reminder email temporizzati
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:       ${{ github.repository }}
        run: python scripts/send_reminders.py

      - name: Invia follow-up importatori
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:       ${{ github.repository }}
        run: python scripts/send_importatori_followup.py

      - name: Salva screenshot debug MBE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mbe-debug-screenshots
          path: /tmp/mbe_*.png
          if-no-files-found: ignore
