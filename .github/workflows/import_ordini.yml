name: Import Ordini da Gmail

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 07:00 CET / 08:00 CEST
  workflow_dispatch:        # trigger manuale dal CRM o da GitHub UI

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Importa ordini
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:            ${{ github.repository }}
        run: python scripts/import_ordini.py

      - name: Installa Playwright browser
        run: playwright install chromium --with-deps

      - name: Fetch tracking MBE
        env:
          MBE_EMAIL:       ${{ secrets.MBE_EMAIL }}
          MBE_PASSWORD:    ${{ secrets.MBE_PASSWORD }}
          MBE_TOTP_SECRET: ${{ secrets.MBE_TOTP_SECRET }}
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:         ${{ github.repository }}
        run: python scripts/fetch_mbe_tracking.py

      - name: Invia reminder email temporizzati
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:       ${{ github.repository }}
        run: python scripts/send_reminders.py

      - name: Salva screenshot debug MBE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mbe-debug-screenshots
          path: /tmp/mbe_*.png
          if-no-files-found: ignore
