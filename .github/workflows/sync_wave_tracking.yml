name: Sync Wave Tracking Brevo

on:
  schedule:
    - cron: '0 */4 * * *'  # ogni 4 ore
  workflow_dispatch:        # trigger manuale dal CRM o da GitHub UI

permissions:
  contents: write

jobs:
  sync-wave-tracking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests

      - name: Backfill + sync aperture/click/bounce wave clienti
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER:      ${{ github.repository_owner }}
          GH_REPO:       ${{ github.event.repository.name }}
        run: python scripts/sync_wave_brevo_events.py
