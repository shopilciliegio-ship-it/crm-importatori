name: Tracking ordini automatico

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — mostra solo cosa farebbe, senza salvare né inviare email"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

  schedule:
    - cron: '0 7 * * *'   # ogni giorno alle 07:00 UTC (08:00 CET / 09:00 CEST)

permissions:
  contents: write

jobs:
  check-tracking:
    name: Controlla tracking spedizioni
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui script tracking
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER:          ${{ github.repository_owner }}
          GH_REPO:           ${{ github.event.repository.name || 'crm-importatori' }}
          BREVO_API_KEY:     ${{ secrets.BREVO_API_KEY }}
          TRACK17_API_KEY:   ${{ secrets.TRACK17_API_KEY }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:       ${{ secrets.SENDER_NAME }}
          TRACKING_ENABLED:  "true"
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/check_tracking.py
