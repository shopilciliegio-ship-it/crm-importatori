name: SpottyWifi Weekly Import + Campaign Wave

on:
  schedule:
    - cron: '0 7 * * 1'  # Ogni lunedì alle 07:00 UTC (prima del BWI sync alle 09:00)
  workflow_dispatch:       # Trigger manuale dal CRM o GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  spotty-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests

      - name: Download CSV da SpottyWifi
        working-directory: Spotty
        env:
          SPOTTY_USER: ${{ secrets.SPOTTY_USER }}
          SPOTTY_PASS: ${{ secrets.SPOTTY_PASS }}
        run: |
          python spotty_auto_download.py || echo "⚠ Auto-download fallito — uso CSV esistente se presente"

      - name: Importa nuovi contatti in clienti.json
        working-directory: Spotty
        run: |
          if [ -f utentiregistrati_latest.csv ]; then
            python spotty_import.py utentiregistrati_latest.csv
          elif [ -f "Utentiregistrati LAST.csv" ]; then
            python spotty_import.py "Utentiregistrati LAST.csv"
          else
            echo "⚠ Nessun CSV trovato — skip import"
          fi

      - name: Invia wave1 (>90gg da registrazione)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER:      ${{ github.repository_owner }}
          GH_REPO:       ${{ github.event.repository.name }}
        run: python scripts/send_clienti_wave.py

      - name: Invia wave2 (>120gg da wave1)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER:      ${{ github.repository_owner }}
          GH_REPO:       ${{ github.event.repository.name }}
        run: python scripts/send_clienti_wave2.py

      - name: Commit aggiornamenti
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clienti.json data/email-log.json
          git diff --staged --quiet || git commit -m "Spotty sync + wave — $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash
          git push
