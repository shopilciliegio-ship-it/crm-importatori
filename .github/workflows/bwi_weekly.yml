name: BWI Weekly Scrape + Sync CRM

on:
  schedule:
    - cron: '0 9 * * 1'  # Ogni lunedì alle 09:00 UTC
  workflow_dispatch:       # trigger manuale da GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bwi-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests openpyxl

      - name: Scarica nuove + aggiornate (modalità 2)
        working-directory: BWI
        env:
          BWI_EMAIL:    ${{ secrets.BWI_EMAIL }}
          BWI_PASSWORD: ${{ secrets.BWI_PASSWORD }}
        run: python bestwine_scraper.py --auto 2

      - name: Unisce tutti gli xlsx in bestwine_ALL.xlsx
        working-directory: BWI
        run: python merge_all.py

      - name: Sincronizza XLSX con crm.json
        working-directory: BWI
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python bwi_sync_crm.py

      - name: Commit aggiornamenti
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BWI/bestwine_output/ data/crm.json
          git diff --staged --quiet || git commit -m "BWI sync — $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase
          git push
